name: clippy
on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: checkout_repo
        uses: actions/checkout@v4

      - name: install_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: setup_dav1d
        uses: ./.github/actions/setup-dav1d

      - name: clippy
        run: cargo clippy --all-targets --all-features --workspace
